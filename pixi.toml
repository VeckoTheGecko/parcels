[workspace]
name = "Parcels"
preview = ["pixi-build"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[package]
name = "parcels"
version = "dynamic" # dynamic versioning needs better support in pixi https://github.com/prefix-dev/pixi/issues/2923#issuecomment-2598460666 . Putting `version = "dynamic"` here for now until pixi recommends something else.
license = "MIT" # can remove this once https://github.com/prefix-dev/pixi-build-backends/issues/397 is resolved

[package.build]
backend = { name = "pixi-build-python", version = "==0.4.0" }

[package.host-dependencies]
setuptools = "*"
setuptools_scm = "*"


[package.run-dependencies] # keep section in sync with pyproject.toml dependencies
python = ">=3.11"
netcdf4 = ">=1.6.0"
numpy = ">=2.1.0"
tqdm = ">=4.50.0"
xarray = ">=2024.5.0"
uxarray = ">=2025.3.0"
dask = ">=2024.5.1"
zarr = ">=2.15.0,!=2.18.0,<3"
xgcm = ">=0.9.0"
cf_xarray = ">=0.8.6"
cftime = ">=1.6.3"
pooch = ">=1.8.0"
py-triangle = ">=20250106,<20250107"

[dependencies]
parcels = { path = "." }

[feature.minimum.dependencies]
python = "3.11.*"
netcdf4 = "1.6.*"
numpy = "2.1.*"
tqdm = "4.50.*"
xarray = "2024.5.*"
uxarray = "2025.3.*"
dask = "2024.5.*"
zarr = "2.15.*"
xgcm = "0.9.*"
cf_xarray = "0.8.*"
cftime = "1.6.*"
pooch = "1.8.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.test.dependencies]
nbval = "*"
pytest = "*"
hypothesis = "*"
pytest-html = "*"
pytest-cov = "*"

[feature.test.tasks]
tests = "pytest"
tests-notebooks = "pytest --nbval-lax docs/user_guide/examples"


[feature.notebooks.dependencies]
jupyter = "*"
trajan = "*"
matplotlib-base = ">=2.0.2"
gsw = "*"

[feature.docs.dependencies]
parcels = { path = "." }
numpydoc = "!=1.9.0"
myst-nb = "*"
ipython = "*"
sphinx = "*"
pandoc = "*"
pydata-sphinx-theme = "*"
sphinx-autobuild = "*"
sphinxcontrib-mermaid = "*"
sphinx-design = "*"
scipy = '*'
sphinx-autoapi = "*"

[feature.docs.tasks]
docs = "sphinx-build docs docs/_build"
docs-watch = 'sphinx-autobuild docs docs/_build'
docs-linkcheck = "sphinx-build -b linkcheck docs/ docs/_build/linkcheck"

[feature.pre-commit.dependencies]
pre_commit = "*"

[feature.pre-commit.tasks]
lint = "pre-commit run --all-files"

[feature.typing.dependencies]
mypy = "*"
lxml = "*" # in CI
types-tqdm = "*"

[feature.typing.tasks]
typing = "mypy src/parcels --install-types"


[environments]
default = { features = [
  "test",
  "notebooks",
  "typing",
  "pre-commit",
], solve-group = "main" }
test = { features = ["test"], solve-group = "main" }
test-minimum = { features = ["test", "minimum"] }
test-py311 = { features = ["test", "py311"] }
test-py313 = { features = ["test", "py313"] }
test-notebooks = { features = ["test", "notebooks"], solve-group = "main" }
docs = { features = ["docs", "notebooks"], solve-group = "docs" }
typing = { features = ["typing"], solve-group = "main" }
