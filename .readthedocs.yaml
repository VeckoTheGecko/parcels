version: 2
build:
  os: ubuntu-lts-latest
  tools:
    # just so RTD stops complaining
    python: "latest"
  jobs:
    create_environment:
      - asdf plugin add pixi
      - asdf install pixi 0.70.2
      - asdf global pixi 0.70.2
    install:
      - pixi install -e docs
    build:
      html:
        - pixi run -e docs python ci/scripts/download-all-tutorial-datasets.py
        - SPHINXOPTS='-T' BUILDDIR=$READTHEDOCS_OUTPUT/html pixi run docs-clean
sphinx:
  configuration: docs/conf.py
